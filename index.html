<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>رووم مانسيناكم</title>
  <meta name="theme-color" content="#08030b" />

  <style>
    :root {
      --line: #ffffff2a;
      --txt: #fff7e6;
      --muted: #ffe7bfd4;
      --gold-1: #ffe6ac;
      --gold-2: #ffc769;
      --gold-3: #ff9851;
      --panel: #130d16e6;
      --shadow: #00000099;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      color: var(--txt);
      background: #050209;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: -7;
      overflow: hidden;
      background: radial-gradient(circle at 20% 30%, #8d1e48 0%, #160710 45%, #060208 100%);
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.12);
      filter: saturate(1.3) contrast(1.2) brightness(0.48) blur(0.4px);
      animation: bgPulse 12s ease-in-out infinite;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: -6;
      background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.62) 80%),
        linear-gradient(180deg, rgba(2,1,5,.45) 0%, rgba(3,2,8,.7) 50%, rgba(2,1,4,.92) 100%);
      pointer-events: none;
    }

    .bg-fire {
      position: fixed;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      background:
        radial-gradient(1200px 420px at 50% 112%, #ff8f3a33 0%, transparent 55%),
        radial-gradient(760px 280px at 12% 108%, #ff3d7d20 0%, transparent 60%),
        radial-gradient(760px 280px at 88% 108%, #ffb86a22 0%, transparent 60%);
      animation: fireShift 9s ease-in-out infinite;
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      position: fixed;
      inset: -32%;
      z-index: -4;
      pointer-events: none;
    }

    .aurora {
      background: conic-gradient(from 0deg, transparent, #ffffff11, transparent 36%, #ffbe630f, transparent 70%, #ff4f8914, transparent);
      animation: spin 24s linear infinite;
      filter: blur(7px);
    }

    .aurora::before,
    .aurora::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(76px);
    }

    .aurora::before {
      width: 430px;
      height: 430px;
      top: 6%;
      right: 2%;
      background: #ffcc7642;
      animation: floatY 8s ease-in-out infinite;
    }

    .aurora::after {
      width: 380px;
      height: 380px;
      bottom: 4%;
      left: 2%;
      background: #ff4d772d;
      animation: floatY 10s ease-in-out infinite reverse;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      opacity: .14;
      background-image:
        radial-gradient(circle at 10% 20%, #ffffff 0 1px, transparent 1px),
        radial-gradient(circle at 80% 30%, #ffffff 0 1px, transparent 1px),
        radial-gradient(circle at 40% 90%, #ffffff 0 1px, transparent 1px);
      background-size: 220px 220px;
      animation: drift 18s linear infinite;
    }

    .shell {
      width: min(99vw, 1240px);
      position: relative;
      z-index: 2;
      animation: enter 1s cubic-bezier(.2,.7,.2,1);
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid #ffffff30;
      background: #ffffff10;
      box-shadow: inset 0 1px 0 #ffffff22;
      color: var(--gold-1);
      font-weight: 700;
      font-size: 1rem;
    }

    .tag-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-3));
      box-shadow: 0 0 16px #ffc97c;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2.7rem, 6.2vw, 6rem);
      line-height: 1.14;
      color: var(--gold-1);
      text-shadow: 0 5px 36px #ffba5a33;
      letter-spacing: .35px;
    }

    .sub {
      margin: 0 auto;
      max-width: 900px;
      color: var(--muted);
      line-height: 1.95;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .panel {
      border-radius: 38px;
      background: linear-gradient(180deg, #1b1219f0, var(--panel));
      border: 1px solid var(--line);
      box-shadow:
        0 34px 100px var(--shadow),
        0 0 0 1px #ffffff11 inset,
        0 0 80px #ffb05a18;
      backdrop-filter: blur(14px);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(130deg, #ffffff16, transparent 19%, transparent 77%, #ffcc7311),
        radial-gradient(circle at top left, #ffcc7d1c, transparent 36%);
      pointer-events: none;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1.02fr .98fr;
      position: relative;
      z-index: 1;
    }

    .media {
      position: relative;
      min-height: 620px;
      border-inline-start: 1px solid #ffffff20;
      background: #0a070c;
    }

    .media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.15) contrast(1.08);
    }

    .media-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.65), transparent 42%);
      pointer-events: none;
    }

    .media-text {
      position: absolute;
      bottom: 18px;
      right: 18px;
      left: 18px;
      text-align: center;
      font-weight: 800;
      font-size: 1.7rem;
      color: #fff4dd;
      text-shadow: 0 3px 14px rgba(0,0,0,.66);
    }

    .content {
      padding: 42px 32px 30px;
      display: grid;
      align-content: center;
    }

    .welcome {
      margin: 0 0 20px;
      font-size: 1.65rem;
      color: #fff2d7;
      text-align: center;
      font-weight: 800;
    }

    .btns {
      display: grid;
      gap: 13px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 19px;
      padding: 18px 20px;
      font-size: 1.24rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .2s ease, background .2s ease;
      width: 100%;
    }

    .btn-enter {
      color: #271207;
      background: linear-gradient(100deg, var(--gold-1), var(--gold-2) 45%, var(--gold-3));
      box-shadow: 0 18px 40px #ff934c48, inset 0 1px 0 #fff5d4;
      position: relative;
      overflow: hidden;
    }

    .btn-enter::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 40%;
      right: -55%;
      background: linear-gradient(90deg, transparent, #ffffff78, transparent);
      transform: skewX(-18deg);
      animation: shine 2.8s ease-in-out infinite;
    }

    .btn-play {
      color: #fff6e6;
      background: linear-gradient(180deg, #2a2430, #1a1520);
      border: 1px solid #ffffff2f;
      box-shadow: inset 0 1px 0 #ffffff1e, 0 12px 26px #00000045;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: .2px;
    }

    .btn-play::before {
      content: "▶";
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: .95rem;
      color: #2a1408;
      background: linear-gradient(160deg, #ffe6af, #ffbf67);
      box-shadow: 0 0 16px #ffbf6659;
      flex: none;
    }

    .btn-play.playing {
      color: #2a1408;
      background: linear-gradient(100deg, #ffeab9, #ffd488 45%, #ffb063);
      border-color: transparent;
      box-shadow: 0 15px 32px #ffc36a34, inset 0 1px 0 #fff7de;
    }

    .btn-play.playing::before {
      content: "❚❚";
      font-size: .7rem;
      letter-spacing: -1px;
      color: #fff5dc;
      background: linear-gradient(160deg, #3a2a3c, #241b2a);
      box-shadow: 0 0 16px #2d1f31a6;
    }

    .btn-mute {
      color: #fff7e9;
      background: #ffffff16;
      border: 1px solid #ffffff2d;
      box-shadow: inset 0 1px 0 #ffffff18;
    }

    .btn-enter:hover,
    .btn-play:hover,
    .btn-mute:hover {
      transform: translateY(-2px);
    }

    .audio-box {
      margin-top: 16px;
      border-radius: 19px;
      border: 1px solid #ffffff1c;
      background: #ffffff0a;
      padding: 14px 14px 11px;
    }

    .audio-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 1.08rem;
      color: #ffe6b8;
      margin-bottom: 9px;
      font-weight: 700;
    }

    .status {
      font-size: 1rem;
      color: #fff3d1;
      opacity: .95;
    }

    .range {
      width: 100%;
      cursor: pointer;
      accent-color: #ffaf5f;
      height: 28px;
    }

    .note {
      margin-top: 14px;
      text-align: center;
      color: #fff1cfb9;
      font-size: 1rem;
      line-height: 1.8;
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .panel-grid {
        grid-template-columns: 1fr;
      }

      .media {
        order: -1;
        min-height: 310px;
        border-inline-start: none;
        border-bottom: 1px solid #ffffff20;
      }

      .content {
        padding: 22px 18px 16px;
      }

      h1 {
        font-size: clamp(2.1rem, 8vw, 3.8rem);
      }

      .sub {
        font-size: 1rem;
      }

      .welcome {
        font-size: 1.28rem;
      }

      button {
        font-size: 1.08rem;
        padding: 15px 15px;
      }
    }

    @keyframes enter {
      from { transform: translateY(24px) scale(.985); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    @keyframes shine {
      0%, 100% { right: -55%; }
      55% { right: 120%; }
    }

    @keyframes bgPulse {
      0%,100% { transform: scale(1.12); }
      50% { transform: scale(1.18); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-28px, -16px, 0); }
    }

    @keyframes fireShift {
      0%,100% { opacity: .95; transform: translateY(0); }
      50% { opacity: .7; transform: translateY(-14px); }
    }
  </style>
</head>
<body>
  <div class="video-bg">
    <video autoplay muted loop playsinline preload="auto">
      <source src="video.mp4" type="video/mp4" />
    </video>
  </div>
  <div class="vignette"></div>
  <div class="bg-fire"></div>
  <div class="aurora"></div>
  <div class="noise"></div>

  <div class="shell">
    <section class="hero">
      <span class="tag"><span class="tag-dot"></span>دخول فاخر - تجربة مطوّرة</span>
      <h1>حياكم الله في رووم مانسيناكم</h1>
      <p class="sub">واجهة عملاقة وفخمة بخلفية قوية جدًا، فيديو سينمائي، وصوت قابل للتحكم الكامل.</p>
    </section>

    <main class="panel">
      <div class="panel-grid">
        <div class="content">
          <p class="welcome">جاهز للدخول؟ بضغطة واحدة تدخل للروم مباشرة.</p>

          <div class="btns">
            <button class="btn-enter" type="button" onclick="goToRoom()">دخول الآن</button>
            <button class="btn-play" id="playToggle" type="button">تشغيل الموسيقى</button>
            <button class="btn-mute" id="muteToggle" type="button">كتم الصوت</button>
          </div>

          <div class="audio-box">
            <div class="audio-head">
              <span>مستوى الصوت</span>
              <span class="status" id="audioStatus">جاري تجهيز الصوت...</span>
            </div>
            <input class="range" type="range" id="volumeRange" min="0" max="100" value="70" />
          </div>

          <p class="note">إذا المتصفح منع التشغيل التلقائي، استخدم زر تشغيل الموسيقى مباشرة.</p>
        </div>

        <div class="media">
          <video autoplay muted loop playsinline preload="auto">
            <source src="video.mp4" type="video/mp4" />
          </video>
          <div class="media-shade"></div>
          <div class="media-text">أهلاً وسهلاً بكم ✨</div>
        </div>
      </div>
    </main>
  </div>

  <audio id="bgMusic" loop autoplay muted playsinline preload="auto">
    <source src="https://videotourl.com/audio/1774754182251-5dccd15c-e73c-49c4-af8d-e002023e22ec.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const ROOM_URL = "https://s4.63on.com/launch/admin/69ad5f2ee8da8";

    const music = document.getElementById("bgMusic");
    const playBtn = document.getElementById("playToggle");
    const muteBtn = document.getElementById("muteToggle");
    const volumeRange = document.getElementById("volumeRange");
    const audioStatus = document.getElementById("audioStatus");

    music.volume = 0.7;
    volumeRange.value = 70;

    function goToRoom() {
      window.location.href = ROOM_URL;
    }

    function setStatus(text) {
      audioStatus.textContent = text;
    }

    function updateButtons() {
      muteBtn.textContent = (music.muted || music.volume === 0) ? "إلغاء الكتم" : "كتم الصوت";
      const isPlaying = !music.paused && !music.ended;
      playBtn.classList.toggle("playing", isPlaying);
      playBtn.setAttribute("aria-pressed", isPlaying ? "true" : "false");
      playBtn.textContent = isPlaying ? "إيقاف الموسيقى" : "تشغيل الموسيقى";
    }

    async function playMusic(forceUnmute = false) {
      try {
        if (forceUnmute) {
          music.muted = false;
          if (music.volume === 0) {
            music.volume = 0.7;
            volumeRange.value = 70;
          }
        }
        await music.play();
        setStatus(music.muted ? "الصوت جاهز" : "الصوت يعمل");
      } catch (_) {
        setStatus("بانتظار السماح");
      }
      updateButtons();
    }

    async function tryAutoStart() {
      try {
        music.muted = true;
        await music.play();
        setStatus("الصوت جاهز");
      } catch (_) {
        setStatus("بانتظار تفاعل");
      }
      updateButtons();
    }

    async function unlockAudioOnce() {
      await playMusic(true);
      removeUnlockListeners();
    }

    function removeUnlockListeners() {
      document.removeEventListener("click", unlockAudioOnce);
      document.removeEventListener("touchstart", unlockAudioOnce);
      document.removeEventListener("pointerdown", unlockAudioOnce);
      document.removeEventListener("keydown", unlockAudioOnce);
    }

    playBtn.addEventListener("click", async () => {
      if (music.paused) {
        await playMusic(true);
      } else {
        music.pause();
        setStatus("تم إيقاف الموسيقى");
        updateButtons();
      }
    });

    muteBtn.addEventListener("click", async () => {
      if (music.muted || music.volume === 0) {
        music.muted = false;
        if (music.volume === 0) {
          music.volume = 0.7;
          volumeRange.value = 70;
        }
        await playMusic(false);
      } else {
        music.muted = true;
        setStatus("تم كتم الصوت");
        updateButtons();
      }
    });

    volumeRange.addEventListener("input", async () => {
      const vol = Number(volumeRange.value) / 100;
      music.volume = vol;
      if (vol <= 0) {
        music.muted = true;
        setStatus("الصوت مكتوم");
      } else {
        music.muted = false;
        await playMusic(false);
      }
      updateButtons();
    });

    music.addEventListener("play", updateButtons);
    music.addEventListener("pause", updateButtons);
    music.addEventListener("ended", updateButtons);
    document.addEventListener("DOMContentLoaded", tryAutoStart);
    window.addEventListener("load", tryAutoStart);

    document.addEventListener("click", unlockAudioOnce, { passive: true });
    document.addEventListener("touchstart", unlockAudioOnce, { passive: true });
    document.addEventListener("pointerdown", unlockAudioOnce, { passive: true });
    document.addEventListener("keydown", unlockAudioOnce);

    updateButtons();
  </script>
</body>
</html>
